<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <linearGradient id="plantbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2a1e"/>
      <stop offset="100%" style="stop-color:#0a1f14"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="800" fill="#f1f5f9"/>

  <!-- TOP NAVBAR -->
  <rect width="1280" height="64" fill="white" filter="url(#shadow)"/>
  <rect y="64" width="1280" height="1" fill="#e2e8f0"/>
  <rect x="24" y="16" width="34" height="34" rx="8" fill="#0d9488"/>
  <text x="41" y="38" font-size="17" fill="white" text-anchor="middle">&#x26A1;</text>
  <text x="66" y="38" font-size="18" font-weight="bold" fill="#0f172a">Rehabit</text>
  <rect x="148" y="20" width="98" height="28" rx="14" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <text x="197" y="38" font-size="13" fill="#0d9488" text-anchor="middle" font-weight="600">Dashboard</text>
  <text x="264" y="38" font-size="13" fill="#475569">Habits</text>
  <text x="330" y="38" font-size="13" fill="#475569">Gamification</text>
  <text x="432" y="38" font-size="13" fill="#475569">Community</text>
  <text x="516" y="38" font-size="13" fill="#475569">Mentors</text>
  <text x="580" y="38" font-size="13" fill="#475569">Profile</text>
  <text x="638" y="38" font-size="13" fill="#475569">Subscriptions</text>
  <text x="744" y="38" font-size="13" fill="#475569">Leaderboard</text>
  <rect x="860" y="18" width="80" height="30" rx="15" fill="#0f172a"/>
  <text x="900" y="37" font-size="13" fill="white" text-anchor="middle" font-weight="600">Logout</text>

  <!-- MAIN CONTENT -->
  <text x="68" y="122" font-size="30" font-weight="bold" fill="#0f172a">Welcome back, Javeed!</text>
  <text x="68" y="148" font-size="14" fill="#64748b">Let's keep building those habits</text>
  <rect x="700" y="108" width="120" height="36" rx="8" fill="#0d9488"/>
