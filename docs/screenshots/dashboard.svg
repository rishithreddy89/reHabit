  <rect x="84" y="410" width="250" height="256" rx="10" fill="#071510"/>
  <ellipse cx="209" cy="618" rx="55" ry="10" fill="#1a3a20"/>
  <path d="M178 638 Q175 612 183 608 L235 608 Q243 612 240 638 Z" fill="#c2692a"/>
  <path d="M174 610 Q176 600 209 600 Q242 600 244 610 Z" fill="#d97706"/>
  <rect x="174" y="608" width="70" height="4" rx="2" fill="#f59e0b" opacity="0.6"/>
  <rect x="206" y="530" width="6" height="80" rx="3" fill="#16a34a"/>
  <ellipse cx="200" cy="532" rx="18" ry="9" fill="#22c55e" transform="rotate(-30 200 532)"/>
  <ellipse cx="218" cy="536" rx="18" ry="9" fill="#16a34a" transform="rotate(30 218 536)"/>
  <ellipse cx="209" cy="520" rx="12" ry="16" fill="#4ade80"/>
  <text x="92" y="696" font-size="12" fill="white">Your seedling is sprouting!</text>
  <text x="322" y="696" font-size="12" fill="#4ade80" text-anchor="end">3%</text>
  <rect x="84" y="704" width="250" height="8" rx="4" fill="#1e3a2a"/>
  <rect x="84" y="704" width="9" height="8" rx="4" fill="#4ade80"/>
  <text x="86" y="726" font-size="11" fill="#94a3b8">Day 0</text>
  <text x="209" y="726" font-size="11" fill="#4ade80" text-anchor="middle">Goal: 30 days</text>
  <text x="334" y="726" font-size="11" fill="#94a3b8" text-anchor="end">Day 30</text>

  <!-- TODAY'S HABITS CARD -->
  <rect x="366" y="316" width="646" height="448" rx="14" fill="white" filter="url(#shadow)"/>
  <text x="394" y="358" font-size="17" font-weight="bold" fill="#0f172a">Today's Habits</text>
  <text x="394" y="378" font-size="13" fill="#64748b">Keep your momentum going</text>
  <rect x="384" y="390" width="620" height="1" fill="#f1f5f9"/>
  <rect x="384" y="400" width="612" height="86" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="440" font-size="15" font-weight="600" fill="#0f172a">Revision</text>
  <text x="958" y="440" font-size="12" fill="#94a3b8" text-anchor="end">Personal Growth</text>
  <text x="410" y="468" font-size="12" fill="#f97316">&#x1F525; 0 day streak</text>
  <text x="530" y="468" font-size="12" fill="#0d9488">&#x2299; 0 completions</text>
  <rect x="384" y="496" width="612" height="86" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="536" font-size="15" font-weight="600" fill="#0f172a">Leetcode</text>
  <text x="958" y="536" font-size="12" fill="#94a3b8" text-anchor="end">Lifestyle &amp; Daily Routine</text>
  <text x="410" y="564" font-size="12" fill="#f97316">&#x1F525; 0 day streak</text>
  <text x="530" y="564" font-size="12" fill="#0d9488">&#x2299; 0 completions</text>
  <rect x="384" y="592" width="612" height="86" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="632" font-size="15" font-weight="600" fill="#0f172a">Productivity</text>
  <text x="958" y="632" font-size="12" fill="#94a3b8" text-anchor="end">Productivity &amp; Work</text>
  <text x="410" y="660" font-size="12" fill="#f97316">&#x1F525; 1 day streak</text>
  <text x="530" y="660" font-size="12" fill="#0d9488">&#x2299; 2 completions</text>

  <!-- AI CHATBOT BUTTON -->
  <circle cx="1232" cy="760" r="32" fill="#0d9488" filter="url(#shadow)"/>
  <text x="1232" y="768" font-size="20" fill="white" text-anchor="middle">&#x1F916;</text>
  <circle cx="1248" cy="732" r="8" fill="#f59e0b"/>

  <rect width="1280" height="800" fill="none" stroke="#e2e8f0" stroke-width="1"/>
