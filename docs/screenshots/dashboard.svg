  <rect x="832" y="108" width="140" height="36" rx="8" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="902" y="130" font-size="13" fill="#475569" text-anchor="middle">&#x1F5FA; Progress Map</text>

  <!-- STAT CARDS -->
  <rect x="68" y="168" width="225" height="128" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="150" y="210" font-size="22" text-anchor="middle" fill="#0d9488">&#x25CE;</text>
  <text x="150" y="232" font-size="12" fill="#64748b" text-anchor="middle">Total Habits</text>
  <text x="150" y="268" font-size="40" font-weight="bold" fill="#0f172a" text-anchor="middle">3</text>
  <text x="150" y="288" font-size="11" fill="#64748b" text-anchor="middle">Active tracking</text>

  <rect x="305" y="168" width="225" height="128" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="418" y="210" font-size="22" text-anchor="middle">&#x1F525;</text>
  <text x="418" y="232" font-size="12" fill="#64748b" text-anchor="middle">Current Streak</text>
